<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進料棧板標籤管理系統 (忠於真實欄位數據版)</title>
    <style>
        body { font-family: "SimHei", "黑體", "新細明體", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        h3 { color: #333; margin-top: 20px; background: #e9ecef; padding: 6px 10px; border-left: 4px solid #0056b3; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { padding: 10px 20px; background: #e9ecef; cursor: pointer; border: 1px solid #ccc; border-bottom: none; margin-right: 5px; border-radius: 4px 4px 0 0; }
        .tab.active { background: white; font-weight: bold; border-top: 3px solid #0056b3; }
        .tab-content { border: 1px solid #ccc; padding: 15px; background: white; display: none; border-radius: 0 4px 4px 4px; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 250px; font-family: monospace; box-sizing: border-box; padding: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 140px; font-weight: bold; }
        .form-group input, .form-group select { padding: 5px; width: 250px; }
        .btn-group { margin-top: 15px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 10px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button.print-btn { background-color: #28a745; }
        button.print-btn:hover { background-color: #218838; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        
        .data-list { border-collapse: collapse; width: 100%; margin-top: 10px; }
        .data-list th, .data-list td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        .data-list th { background-color: #f1f3f5; }
        .edit-input { width: 95%; padding: 4px; box-sizing: border-box; }
        .count-input { width: 45px; padding: 4px; text-align: center; }
        .config-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px 15px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        .alert-row { background-color: #f8d7da !important; color: #721c24; }

        #printArea { display: none; }

        /* ==================== 【A4 2x3 絕對座標與高度獨立微調】 ==================== */
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            html, body { background: white; margin: 0 !important; padding: 0 !important; width: 210mm; height: 297mm; }
            .no-print { display: none !important; }
            #printArea { display: block !important; background: transparent; padding: 0; margin: 0; width: 210mm; height: 297mm; }
            
            .page { 
                position: relative; 
                width: 210mm; 
                height: 297mm; 
                page-break-after: always; 
                box-sizing: border-box; 
                overflow: hidden; 
                background: transparent;
            }
            
            .label-cell { 
                position: absolute; 
                width: 100mm; 
                height: 95mm; 
                box-sizing: border-box; 
                padding: 0mm 2mm 0mm 2mm; 
                overflow: hidden; 
                display: flex; 
                flex-direction: column; 
                justify-content: flex-start;
                background: transparent;
            }
            
            /* 2x3 網格定位 */
            .pos-0 { top: 0mm; left: 4mm; }
            .pos-1 { top: 0mm; left: 104mm; }
            .pos-2 { top: 95mm; left: 4mm; }
            .pos-3 { top: 95mm; left: 104mm; }
            .pos-4 { top: 190mm; left: 4mm; }
            .pos-5 { top: 190mm; left: 104mm; }

            /* 精準高度分配：保留頂部 5cm (50mm) 留白區 */
            .m1-h1 { height: 50mm; } 
            .m1-h2 { height: 28mm; display: flex; align-items: center; } /* 上格：調高 1.2cm (16->28mm) */
            .m1-h3 { height: 12mm; display: flex; align-items: center; } /* 中格：維持不動 (12mm) */
            .m1-h4 { height: 7mm;  display: flex; flex-direction: column; justify-content: flex-end; } /* 下格：調低 1.0cm (17->7mm) */

            .m2-h1 { height: 50mm; } 
            .m2-h2 { height: 28mm; display: flex; align-items: center; } 
            .m2-h3 { height: 19mm; display: flex; flex-direction: column; justify-content: flex-end; } 
            
            .svg-line-container { width: 100%; height: 100%; display: block; }
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <h2>棧板標籤自動流轉系統 (真實數據防錯版)</h2>
        
        <div class="config-panel">
            <label style="cursor: pointer;">
                <input type="checkbox" id="enableAlert" checked> 當偵測到序號、原料重複項目時，顯示彈窗提示並將舊單自動歸 0。
            </label>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">非常備 (模式一：大範圍直式複製)</div>
            <div class="tab" onclick="switchTab(2)">常備基板 (模式二：常備表格網頁)</div>
            <div class="tab" onclick="switchTab(3)">模式三：手動逐筆新增</div>
        </div>

        <div id="tab1" class="tab-content active">
            <p>請從 Excel 複製非常備資料明細，直接貼到下方框內（系統會百分之百依據網格位置讀取真實數量）：</p>
            <textarea id="textData1" placeholder="請在此貼上 Excel 複製的非常備明細數據..."></textarea>
            <button onclick="parseMode1()">網格精準解析匯入</button>
        </div>

        <div id="tab2" class="tab-content">
            <p>請直接將常備網頁或 Excel 資料整段貼上：</p>
            <textarea id="textData2" placeholder="直接貼上進料管理表資料..."></textarea>
            <button onclick="parseMode2()">智慧剖析並匯入</button>
        </div>

        <div id="tab3" class="tab-content">
            <div class="form-group">
                <label>使用版型格式：</label>
                <select id="manualMode" onchange="toggleManualInputs()">
                    <option value="mode1">非常備版型</option>
                    <option value="mode2">常備基板版型</option>
                </select>
            </div>
            <div class="form-group">
                <label>比對唯一編號：</label><input type="text" id="manualPureCode" placeholder="如編號或原料編號">
            </div>
            <div class="form-group">
                <label>第二行顯示內容：</label><input type="text" id="manualL2" placeholder="EM-896K2 RTF">
            </div>
            <div id="manualL3Group" class="form-group">
                <label>第三行顯示內容：</label><input type="text" id="manualL3" placeholder="4mil T/T 1078*1">
            </div>
            <div class="form-group">
                <label id="manualL4Label">第四行內容：</label><input type="text" id="manualL4" value="26 4/22 劉浚銘 125">
            </div>
            <div class="form-group">
                <label>微型小字追蹤碼：</label><input type="text" id="manualSubTrack" placeholder="7-260327-078 (選填)">
            </div>
            <div class="form-group">
                <label>數量異常紅字：</label>
                <select id="manualIsErr">
                    <option value="false">正常 (黑色)</option>
                    <option value="true">異常 (紅色)</option>
                </select>
            </div>
            <div class="form-group">
                <label>是否IQC/QA：</label>
                <select id="manualIqc">
                    <option value="false">無 (一般標籤)</option>
                    <option value="true">有 (首張自動帶 QA)</option>
                </select>
            </div>
            <button onclick="parseMode3()">新增至資料庫</button>
        </div>

        <div class="btn-group">
            <button class="print-btn" onclick="doPrint()">執行列印設定張數</button>
            <button class="danger" onclick="clearAllData()">清空記憶資料庫</button>
        </div>

        <h3>資料庫清單</h3>
        <table class="data-list">
            <thead>
                <tr>
                    <th width="4%">序</th>
                    <th width="10%">版型</th>
                    <th width="13%">比對判定編號</th>
                    <th width="18%">第二行顯示 (料號+銅箔種類)</th>
                    <th width="18%">第三行顯示 (厚度+銅箔尺寸)</th>
                    <th width="18%">第四行顯示 (日期 人名 數量)</th>
                    <th width="11%">微型追蹤碼</th>
                    <th width="4%">張數</th>
                    <th width="4%">管理</th>
                </tr>
            </thead>
            <tbody id="storageList"></tbody>
        </table>
    </div>

    <div id="printArea"></div>

    <script>
        window.onload = function() { renderTable(); toggleManualInputs(); };

        function switchTab(num) {
            for(var i=1; i<=3; i++) {
                document.getElementById('tab'+i).classList.remove('active');
                document.getElementsByClassName('tab')[i-1].classList.remove('active');
            }
            document.getElementById('tab'+num).classList.add('active');
            document.getElementsByClassName('tab')[num-1].classList.add('active');
        }

        function toggleManualInputs() {
            var m = document.getElementById('manualMode').value;
            if(m === 'mode1') {
                document.getElementById('manualL3Group').style.display = 'block';
                document.getElementById('manualL4Label').innerText = "第四行內容：";
            } else {
                document.getElementById('manualL3Group').style.display = 'none';
                document.getElementById('manualL4Label').innerText = "第三行內容：";
            }
        }

        function getDB() { return JSON.parse(localStorage.getItem('palletSysDB2026_v8')) || []; }
        function saveDB(data) { localStorage.setItem('palletSysDB2026_v8', JSON.stringify(data)); renderTable(); }

        function formatDateStr(dStr) {
            dStr = dStr.trim();
            if(dStr.length === 8) dStr = dStr.substring(2);
            if(dStr.length === 6) {
                var yy = dStr.substring(0, 2);
                var mm = parseInt(dStr.substring(2, 4), 10);
                var dd = parseInt(dStr.substring(4, 6), 10);
                return yy + " " + mm + "/" + dd;
            }
            return dStr;
        }

        function checkDuplicateKey(db, mode, checkCode) {
            for(var i=0; i<db.length; i++) {
                if(db[i].mode === mode && db[i].pureCode.toString().trim() === checkCode.toString().trim()) {
                    return i; 
                }
            }
            return -1;
        }

        /* ==================== 【徹底修正：完全依照網格真實數據，拒絕盲目 125】 ==================== */
        function parseMode1() {
            var txt = document.getElementById('textData1').value;
            if(!txt.trim()) return;

            var lines = txt.split('\n');
            var db = getDB();
            var showAlert = document.getElementById('enableAlert').checked;
            var successCount = 0;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (!line.trim() || line.indexOf("物料型號") !== -1 || line.indexOf("非常備品") !== -1) continue;

                var cells = line.split('\t').map(function(c) { return c.trim(); });
                
                // 第一行特徵：開頭欄位是純數字的項次
                if (cells.length >= 7 && /^\d+$/.test(cells[0])) {
                    var itemNo = cells[0];       // 項次
                    var rawDate = cells[1];      // 進貨日
                    var partNo = cells[2];       // 物料型號
                    var glassType = cells[4];    // 玻璃布型號與張數
                    var mainQty = cells[6] || ""; // 第一行「進量」真實欄位數值

                    // 初始化第二行的預期變數
                    var name = "劉浚銘";
                    var thickness = "4mil";
                    var foilType = "RTF";
                    var subTrackCode = "";
                    var subQty = "";

                    // 檢查下一行是否為對應的第二行（備註、人名、規格細節與庫存量）
                    if (i + 1 < lines.length) {
                        var nextCells = lines[i + 1].split('\t').map(function(c) { return c.trim(); });
                        // 第二行開頭通常是空的，且第二格有人名
                        if (nextCells[0] === "" && nextCells[1] !== "" && !/^\d+$/.test(nextCells[1])) {
                            name = nextCells[1];
                            thickness = nextCells[2] || "4mil";
                            foilType = nextCells[3] || "RTF";
                            subQty = nextCells[6] || ""; // 第二行對應的「庫存量」數值

                            // 找微型追蹤碼
                            for(var k = 0; k < nextCells.length; k++) {
                                var trackM = nextCells[k].match(/(7-\d{6}-\d{3})/);
                                if(trackM) { subTrackCode = trackM[1]; break; }
                            }
                            i++; // 精準跳過下一行完成合併
                        }
                    }

                    // 【徹底移除任何強制覆蓋邏輯】
                    // 優先取第一行的進量，沒有則取第二行的庫存量，若全部沒填就填「未填」
                    var parsedQty = mainQty || subQty || "未填";

                    var formattedDate = formatDateStr(rawDate);
                    var finalLine2 = partNo + " " + foilType;
                    var finalLine3 = thickness + " " + glassType;
                    var finalLine4 = formattedDate + " " + name + " " + parsedQty;

                    var dupIdx = checkDuplicateKey(db, 'mode1', itemNo);
                    if(dupIdx !== -1) {
                        db[dupIdx].printCount = 0;
                        if(showAlert) { alert("非常備項次【" + itemNo + "】重複，舊資料列印張數歸零。"); }
                    }

                    db.push({
                        mode: 'mode1', pureCode: itemNo, line2: finalLine2, line3: finalLine3, line4: finalLine4,
                        subTrack: subTrackCode, isQtyErr: false, isQA: false, printCount: 1
                    });
                    successCount++;
                }
            }
            saveDB(db);
            document.getElementById('textData1').value = '';
            alert("網格流轉完成！成功精準匯入 " + successCount + " 筆非常備資料。");
        }

        function parseMode2() {
            var txt = document.getElementById('textData2').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var db = getDB();
            var importCount = 0;
            var showAlert = document.getElementById('enableAlert').checked;

            for(var i=0; i<lines.length; i++) {
                var line = lines[i].trim();
                if(line === "" || line.indexOf("合計") !== -1 || line.indexOf("原料編號") !== -1) continue;

                var cells = line.split('\t').map(function(c) { return c.trim(); });
                if(cells.length >= 5) {
                    var dateNo = formatDateStr(cells[1] || "");
                    var purePartNo = cells[4];
                    var hasIqc = (line.indexOf("有") !== -1);

                    if(purePartNo && purePartNo.indexOf("-") !== -1) {
                        var dupIdx = checkDuplicateKey(db, 'mode2', purePartNo);
                        if(dupIdx !== -1) {
                            db[dupIdx].printCount = 0;
                            if(showAlert) { alert("常備基板原料【" + purePartNo + "】重複，舊列印數歸零。"); }
                        }
                        db.push({ mode: 'mode2', pureCode: purePartNo, line2: purePartNo, line3: "", line4: dateNo, subTrack: "", isQtyErr: false, isQA: hasIqc, printCount: 1 });
                        importCount++;
                    }
                }
            }
            saveDB(db);
            document.getElementById('textData2').value = '';
            if(importCount > 0) alert("常備基板處理完成！共匯入 " + importCount + " 筆。");
        }

        function parseMode3() {
            var m = document.getElementById('manualMode').value;
            var pCode = document.getElementById('manualPureCode').value.trim();
            var l2 = document.getElementById('manualL2').value.trim();
            var l3 = document.getElementById('manualL3').value.trim();
            var l4 = document.getElementById('manualL4').value.trim();
            var subT = document.getElementById('manualSubTrack').value.trim();
            var isErr = document.getElementById('manualIsErr').value === "true";
            var iqc = document.getElementById('manualIqc').value === "true";
            
            if(!pCode || !l2 || !l4) { alert("請填寫必要的欄位！"); return; }
            if(m === 'mode2') { l3 = ""; }

            var db = getDB();
            var dupIdx = checkDuplicateKey(db, m, pCode);
            if(dupIdx !== -1) { db[dupIdx].printCount = 0; }

            db.push({ mode: m, pureCode: pCode, line2: l2, line3: l3, line4: l4, subTrack: subT, isQtyErr: isErr, isQA: iqc, printCount: 1 });
            saveDB(db);
            alert("手動新增成功！");
        }

        function renderTable() {
            var db = getDB();
            var tbody = document.getElementById('storageList');
            tbody.innerHTML = '';

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                var tr = document.createElement('tr');
                if(item.isQtyErr) { tr.classList.add('alert-row'); }

                var modeText = item.mode === 'mode1' ? '<span style="color:blue;font-weight:bold;">非常備</span>' : '<span style="color:green;font-weight:bold;">常備基板</span>';
                var disabledL3 = item.mode === 'mode2' ? 'disabled style="background:#eee"' : '';
                
                tr.innerHTML = '<td>' + (i+1) + '</td>' +
                    '<td>' + modeText + '</td>' +
                    '<td><b>' + item.pureCode + '</b></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line2+'" onchange="updateItem('+i+', \'line2\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line3+'" '+disabledL3+' onchange="updateItem('+i+', \'line3\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line4+'" onchange="updateItem('+i+', \'line4\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+(item.subTrack || '')+'" onchange="updateItem('+i+', \'subTrack\', this.value)"></td>' +
                    '<td><input type="number" class="count-input" min="0" value="'+item.printCount+'" onchange="updateItem('+i+', \'printCount\', parseInt(this.value,10)||0)"></td>' +
                    '<td><button class="danger" style="padding:3px 8px; font-size:11px;" onclick="deleteItem('+i+')">刪除</button></td>';
                
                tbody.appendChild(tr);
            }
        }

        function updateItem(idx, field, value) {
            var db = getDB();
            db[idx][field] = value;
            localStorage.setItem('palletSysDB2026_v8', JSON.stringify(db));
            if(field === 'printCount') { renderTable(); }
        }

        function deleteItem(idx) {
            if(confirm("確定刪除此筆資料嗎？")) {
                var db = getDB();
                db.splice(idx, 1);
                saveDB(db);
            }
        }

        function clearAllData() { if(confirm("確定要清空整個資料庫？")) { saveDB([]); } }

        /* ==================== 【微型碼與字體高度縱向放大拉高機制】 ==================== */
        function makeSemanticSvg(item, rowNum, alignMode, extraQA) {
            var textAnchor = (alignMode === "left") ? "start" : "middle";
            var xPos = (alignMode === "left") ? "2%" : "50%";
            var colorHex = item.isQtyErr ? "#FF0000" : "#000000";
            
            var segments = [];
            var viewBoxHeight = 12; 
            var fontSizeValue = 10;  

            if (item.mode === 'mode1') {
                if (rowNum === 2) {
                    viewBoxHeight = 14; fontSizeValue = 10;
                    segments.push({ text: item.line2, isBold: true, color: "#000" });
                } 
                else if (rowNum === 3) {
                    viewBoxHeight = 12; fontSizeValue = 10;
                    segments.push({ text: item.line3, isBold: true, color: "#000" });
                } 
                else if (rowNum === 4) {
                    viewBoxHeight = 15; fontSizeValue = 9.5;
                    var tokens = item.line4.split(/\s+/); 
                    if(tokens.length >= 3) {
                        segments.push({ text: tokens[0] + " ", isBold: true, color: "#000" }); // 日期
                        segments.push({ text: tokens[1] + " ", isBold: false, color: "#333" }); // 人名
                        var remainTokens = tokens.slice(2).join(" ");
                        if(remainTokens) { segments.push({ text: "  " + remainTokens, isBold: true, color: colorHex }); } // 真實數量
                    } else {
                        segments.push({ text: item.line4, isBold: true, color: "#000" });
                    }
                }
            } 
            else if (item.mode === 'mode2') {
                if (rowNum === 2) {
                    viewBoxHeight = 14; fontSizeValue = 11;
                    segments.push({ text: item.line2, isBold: true, color: "#000" });
                } 
                else if (rowNum === 3) {
                    viewBoxHeight = 12; fontSizeValue = 10;
                    var tokens = item.line4.split(/\s+/); 
                    if(tokens.length >= 2) {
                        segments.push({ text: tokens[0] + " " + tokens[1], isBold: true, color: "#000" });
                        var remain = tokens.slice(2).join(" ");
                        if(remain) segments.push({ text: " " + remain, isBold: false, color: "#333" });
                    } else {
                        segments.push({ text: item.line4, isBold: true, color: "#000" });
                    }
                }
            }

            if(extraQA) { segments.push({ text: extraQA, isBold: true, color: "#000" }); }

            var tspanHtml = '';
            segments.forEach(function(seg) {
                if(!seg.text) return;
                var strokeAttr = (seg.isBold) ? ' stroke-width="0.3" stroke="'+seg.color+'"' : ' stroke-width="0"';
                var weightAttr = (seg.isBold) ? ' font-weight="900"' : ' font-weight="normal"';
                tspanHtml += '<tspan' + weightAttr + strokeAttr + ' fill="' + seg.color + '">' + seg.text + '</tspan>';
            });

            // 【微型碼精密位置】：置於人名正上方（y="3.2"），取消反白
            var subTrackHtml = '';
            if(item.mode === 'mode1' && rowNum === 4 && item.subTrack) {
                subTrackHtml = '<text x="36%" y="3.2" font-family="Arial" font-size="2.6" font-weight="bold" text-anchor="start" fill="#000000" style="letter-spacing: 0.1px;">' + item.subTrack + '</text>';
            }

            // 【字體拉高】：高度拉長 35%，寬度不縮放
            var yPos = (viewBoxHeight - 1) / 1.35; 
            return '<svg class="svg-line-container" viewBox="0 0 100 ' + viewBoxHeight + '" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">' +
                   subTrackHtml + 
                   '<g transform="scale(1, 1.35)">' +
                   '<text x="'+xPos+'" y="' + yPos + '" font-family="SimHei, 黑體, Arial" font-size="' + fontSizeValue + '" text-anchor="' + textAnchor + '">' + tspanHtml + '</text>' +
                   '</g>' +
                   '</svg>';
        }

        function doPrint() {
            var db = getDB();
            var printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            var html = '';
            var cellCounter = 0;
            var labelsPerPage = 6;

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                if(item.printCount <= 0) continue; 
                
                for(var c=0; c<item.printCount; c++) {
                    if(cellCounter % labelsPerPage === 0) {
                        if(cellCounter > 0) html += '</div>';
                        html += '<div class="page">';
                    }

                    var posIndex = cellCounter % labelsPerPage;
                    var isCurrentQA = (item.isQA && c === 0);
                    var qaSuffix = isCurrentQA ? "  QA" : "";

                    if (item.mode === 'mode1') {
                        html += '<div class="label-cell pos-' + posIndex + '">' +
                                '<div class="svg-wrapper m1-h1"></div>' + 
                                '<div class="svg-wrapper m1-h2">' + makeSemanticSvg(item, 2, "center", "") + '</div>' + 
                                '<div class="svg-wrapper m1-h3">' + makeSemanticSvg(item, 3, "center", "") + '</div>' + 
                                '<div class="svg-wrapper m1-h4">' + makeSemanticSvg(item, 4, "center", qaSuffix) + '</div>' + 
                                '</div>';
                    } else {
                        html += '<div class="label-cell pos-' + posIndex + '">' +
                                '<div class="svg-wrapper m2-h1"></div>' + 
                                '<div class="svg-wrapper m2-h2">' + makeSemanticSvg(item, 2, "center", "") + '</div>' + 
                                '<div class="svg-wrapper m2-h3">' + makeSemanticSvg(item, 3, "left", qaSuffix) + '</div>' + 
                                '</div>';
                    }
                    cellCounter++;
                }
            }
            if(cellCounter > 0) html += '</div>';
            printArea.innerHTML = html;

            if(cellCounter === 0) { alert("當前沒有任何有效列印張數。"); return; }
            window.print();
        }
    </script>
</body>
</html>
