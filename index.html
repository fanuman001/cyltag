<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進料棧板標籤多功能管理系統 (2x3滿版極限字體版)</title>
    <style>
        body { font-family: "SimHei", "黑體", "新細明體", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1050px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        h3 { color: #333; margin-top: 20px; background: #e9ecef; padding: 6px 10px; border-left: 4px solid #0056b3; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { padding: 10px 20px; background: #e9ecef; cursor: pointer; border: 1px solid #ccc; border-bottom: none; margin-right: 5px; border-radius: 4px 4px 0 0; }
        .tab.active { background: white; font-weight: bold; border-top: 3px solid #0056b3; }
        .tab-content { border: 1px solid #ccc; padding: 15px; background: white; display: none; border-radius: 0 4px 4px 4px; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 180px; font-family: monospace; box-sizing: border-box; padding: 10px; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 140px; font-weight: bold; }
        .form-group input, .form-group select { padding: 5px; width: 250px; }
        .btn-group { margin-top: 15px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 10px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button.print-btn { background-color: #28a745; }
        button.print-btn:hover { background-color: #218838; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        
        .data-list { border-collapse: collapse; width: 100%; margin-top: 10px; }
        .data-list th, .data-list td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        .data-list th { background-color: #f1f3f5; }
        .edit-input { width: 95%; padding: 4px; box-sizing: border-box; }
        .count-input { width: 45px; padding: 4px; text-align: center; }

        /* 畫面上預覽列印區塊（不影響實際列印） */
        #printArea { background: #666; padding: 10px; display: none; }

        /* ==================== 列印專用 A4 2x3 滿版樣式 ==================== */
        @media print {
            html, body { background: white; margin: 0 !important; padding: 0 !important; width: 210mm; height: 297mm; }
            .no-print { display: none !important; }
            #printArea { display: block !important; background: transparent; padding: 0; }
            
            /* A4 滿版頁面外殼，完全拔除邊距 */
            .page { width: 210mm; height: 297mm; page-break-after: always; box-sizing: border-box; overflow: hidden; padding: 0; margin: 0; }
            
            /* 2x3 貼紙格局 (滿版計算：寬100mm*2 = 200mm, 橫向留白10mm分配在邊緣；高93mm*3 = 279mm) */
            .label-cell { width: 100mm; height: 93mm; float: left; margin: 0; border: none; box-sizing: border-box; padding: 4mm 6mm; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
            
            /* 為了避免任何歪斜，每頁第1、3、5張(左邊欄)左側給予5mm初始位移，達成左右均分 */
            .label-cell:nth-child(2n+1) { padding-left: 10mm; padding-right: 2mm; }
            .label-cell:nth-child(2n) { padding-left: 2mm; padding-right: 10mm; }

            .svg-line-container { width: 100%; height: 100%; display: block; overflow: hidden; }
            
            /* 模式一高度分配 (4行版面) */
            .m1-h1 { height: 16mm; } 
            .m1-h2 { height: 22mm; } 
            .m1-h3 { height: 22mm; } 
            .m1-h4 { height: 22mm; } 

            /* 模式二高度分配 (3行版面) */
            .m2-h1 { height: 24mm; } 
            .m2-h2 { height: 32mm; } 
            .m2-h3 { height: 32mm; } 
            
            /* 強制極限黑體粗體 */
            text { font-family: "SimHei", "黑體", "Arial Black", sans-serif !important; font-weight: 900 !important; }
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <h2>棧板標籤自動流轉系統 (2x3 A4滿版最終優化版)</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">模式一：貼上直式文字(1*6)</div>
            <div class="tab" onclick="switchTab(2)">模式二：貼上網頁進料表</div>
            <div class="tab" onclick="switchTab(3)">模式三：手動逐筆新增</div>
        </div>

        <div id="tab1" class="tab-content active">
            <p>請貼上第一種原始文字資料（依開頭流水編號如 1165 判斷重複）：</p>
            <textarea id="textData1" placeholder="1165	260625&#10;王水欽	EM-890..."></textarea>
            <button onclick="parseMode1()">剖析並匯入</button>
        </div>

        <div id="tab2" class="tab-content">
            <p>請直接將網頁整段複製（將精準識別開頭序號，且日期自動靠左、右邊留空）：</p>
            <textarea id="textData2" placeholder="直接把網頁複製的進料管理表資料整段貼在這裡..."></textarea>
            <button onclick="parseMode2()">智慧剖析並匯入</button>
        </div>

        <div id="tab3" class="tab-content">
            <div class="form-group">
                <label>使用版型格式：</label>
                <select id="manualMode" onchange="toggleManualInputs()">
                    <option value="mode1">模式一版型 (4行：留白/料號/規格/日期居中)</option>
                    <option value="mode2">模式二版型 (3行：留白/編號/日期靠左)</option>
                </select>
            </div>
            <div class="form-group">
                <label>比對唯一編號(流水號/序號)：</label><input type="text" id="manualPureCode" placeholder="如：1165 或 1">
            </div>
            <div class="form-group">
                <label>第二行內容：</label><input type="text" id="manualL2" placeholder="如：EM-890 或 1-Nn16-U1EA">
            </div>
            <div id="manualL3Group" class="form-group">
                <label>第三行內容 (規格)：</label><input type="text" id="manualL3" placeholder="如：RTF3 4mil 1/H 1035*2">
            </div>
            <div class="form-group">
                <label id="manualL4Label">第四行內容 (日期人員)：</label><input type="text" id="manualL4" placeholder="如：26 6/25 王水欽 4000">
            </div>
            <div class="form-group">
                <label>是否IQC/QA：</label>
                <select id="manualIqc">
                    <option value="false">無 (全部皆為一般標籤)</option>
                    <option value="true">有 (首張自動帶 QA 字樣)</option>
                </select>
            </div>
            <button onclick="parseMode3()">新增至資料庫</button>
        </div>

        <div class="btn-group">
            <button class="print-btn" onclick="doPrint()">執行列印設定張數</button>
            <button class="danger" onclick="clearAllData()">清空記憶資料庫</button>
        </div>

        <h3>資料庫清單 (模式1看流水號/模式2看序號防重)</h3>
        <table class="data-list">
            <thead>
                <tr>
                    <th width="4%">序</th>
                    <th width="12%">版型</th>
                    <th width="12%">比對判定編號</th>
                    <th width="23%">第二行顯示內容</th>
                    <th width="20%">第三行顯示內容</th>
                    <th width="17%">第四行顯示內容</th>
                    <th width="6%">首張QA</th>
                    <th width="4%">張數</th>
                    <th width="4%">管理</th>
                </tr>
            </thead>
            <tbody id="storageList"></tbody>
        </table>
    </div>

    <div id="printArea"></div>

    <script>
        window.onload = function() { renderTable(); toggleManualInputs(); };

        function switchTab(num) {
            for(var i=1; i<=3; i++) {
                document.getElementById('tab'+i).classList.remove('active');
                document.getElementsByClassName('tab')[i-1].classList.remove('active');
            }
            document.getElementById('tab'+num).classList.add('active');
            document.getElementsByClassName('tab')[num-1].classList.add('active');
        }

        function toggleManualInputs() {
            var m = document.getElementById('manualMode').value;
            if(m === 'mode1') {
                document.getElementById('manualL3Group').style.display = 'block';
                document.getElementById('manualL4Label').innerText = "第四行內容 (日期人員)：";
            } else {
                document.getElementById('manualL3Group').style.display = 'none';
                document.getElementById('manualL4Label').innerText = "第三行內容 (日期人員)：";
            }
        }

        function getDB() { return JSON.parse(localStorage.getItem('palletSysDB')) || []; }
        function saveDB(data) { localStorage.setItem('palletSysDB', JSON.stringify(data)); renderTable(); }

        function formatDateStr(dStr) {
            dStr = dStr.trim();
            if(dStr.length === 8) dStr = dStr.substring(2);
            if(dStr.length === 6) {
                var yy = dStr.substring(0, 2);
                var mm = parseInt(dStr.substring(2, 4), 10);
                var dd = parseInt(dStr.substring(4, 6), 10);
                return yy + " " + mm + "/" + dd;
            }
            return dStr;
        }

        function checkDuplicateKey(db, mode, checkCode) {
            for(var i=0; i<db.length; i++) {
                if(db[i].mode === mode && db[i].pureCode.toString().trim() === checkCode.toString().trim()) {
                    return i; 
                }
            }
            return -1;
        }

        // 【模式一剖析】
        function parseMode1() {
            var txt = document.getElementById('textData1').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var currentChunk = [];
            var db = getDB();

            for(var i=0; i<lines.length; i++) {
                if(lines[i].trim() !== "") currentChunk.push(lines[i]);
                if(lines[i].indexOf("修改") !== -1) {
                    if(currentChunk.length >= 6) {
                        var r = currentChunk.map(function(l) {
                            var parts = l.split('\t');
                            if(parts.length < 2) parts = l.split(/\s+/); 
                            return parts.map(function(p) { return p.trim(); });
                        });

                        var pureSerialNo = r[0][0] || ""; 
                        var dateRaw  = r[0][1] || "";
                        var name     = r[1][0] || "";
                        var purePartNo = r[1][1] || ""; 
                        var spec1    = r[2][0] || "";
                        var spec2    = r[2][1] || "";
                        var typeNo   = r[3][0] || "";
                        var size     = r[3][1] || "";
                        var emcCount = r[5][1] || "";

                        var line2_val = purePartNo + " " + typeNo; 
                        var line3_val = spec1 + " " + spec2 + " " + size;
                        var line4_val = formatDateStr(dateRaw) + " " + name + " " + emcCount;

                        var dupIdx = checkDuplicateKey(db, 'mode1', pureSerialNo);
                        if(dupIdx !== -1) {
                            if(confirm("模式一：流水號【" + pureSerialNo + "】已存在！\n點擊「確定」累加列印張數，點擊「取消」跳過。")) {
                                db[dupIdx].printCount += 1;
                            }
                        } else {
                            db.push({ mode: 'mode1', pureCode: pureSerialNo, line2: line2_val, line3: line3_val, line4: line4_val, isQA: false, printCount: 1 });
                        }
                    }
                    currentChunk = [];
                }
            }
            saveDB(db);
            document.getElementById('textData1').value = '';
            alert("模式一處理完成！");
        }

        // 【模式二剖析：進階精準序號識別】
        function parseMode2() {
            var txt = document.getElementById('textData2').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var db = getDB();
            var importCount = 0;

            // PCB原料編號核心格式正則表達式
            var partNoRegex = /(1-[A-Za-z0-9]{4}-([A-Za-z0-9]{4}|[A-Za-z0-9]{5,6}))/;

            for(var i=0; i<lines.length; i++) {
                var line = lines[i].trim();
                if(line === "" || line.indexOf("合計") !== -1 || line.indexOf("取消") !== -1 || line.indexOf("原料編號") !== -1) continue;

                var match = partNoRegex.exec(line);
                if(match) {
                    var purePartNo = match[1]; 
                    var partNoIdx = match.index;

                    // 擷取原料編號前半段（處理可能黏著的序號與日期）
                    var frontPart = line.substring(0, partNoIdx).trim();
                    
                    var pureSeqNo = "";
                    var dateNo = "26 6/29"; // 預設安全彈性值

                    // 利用2026開頭的日期特徵，將前方的獨立序號完全解析出來
                    var dateMatch = frontPart.match(/(20\d{6})/);
                    if(dateMatch) {
                        var dateStrRaw = dateMatch[1];
                        var dateIndex = frontPart.indexOf(dateStrRaw);
                        
                        // 日期前面的純數字，就是我們要防重的關鍵「網頁序號」
                        var prefixSeq = frontPart.substring(0, dateIndex).trim();
                        pureSeqNo = prefixSeq ? prefixSeq : (importCount + 1).toString();
                        dateNo = formatDateStr(dateStrRaw);
                    } else {
                        // 防呆 fallback
                        var seqMatch = frontPart.match(/^(\d+)/);
                        pureSeqNo = seqMatch ? seqMatch[1] : (importCount + 1).toString();
                    }

                    var backPart = line.substring(partNoIdx + purePartNo.length);
                    var hasIqc = (backPart.indexOf("有") !== -1);

                    var line2_val = purePartNo;
                    var line3_val = ""; 
                    var line4_val = dateNo;

                    // 依據純序號（1, 2, 3...）判斷重複
                    var dupIdx = checkDuplicateKey(db, 'mode2', pureSeqNo);
                    if(dupIdx !== -1) {
                        if(confirm("模式二：網頁序號【" + pureSeqNo + "】已存在！\n點擊「確定」累加列印張數，點擊「取消」跳過。")) {
                            db[dupIdx].printCount += 1;
                        }
                    } else {
                        db.push({ mode: 'mode2', pureCode: pureSeqNo, line2: line2_val, line3: line3_val, line4: line4_val, isQA: hasIqc, printCount: 1 });
                    }
                    importCount++;
                }
            }
            saveDB(db);
            document.getElementById('textData2').value = '';
            if(importCount > 0) {
                alert("模式二智慧解析成功，已匯入並處理完畢！");
            } else {
                alert("未偵測到符合工廠規格原料編號的資料列，請重新確認貼上內容。");
            }
        }

        // 【模式三手動新增】
        function parseMode3() {
            var m = document.getElementById('manualMode').value;
            var pCode = document.getElementById('manualPureCode').value.trim();
            var l2 = document.getElementById('manualL2').value.trim();
            var l3 = document.getElementById('manualL3').value.trim();
            var l4 = document.getElementById('manualL4').value.trim();
            var iqc = document.getElementById('manualIqc').value === "true";
            
            if(!pCode || !l2 || !l4) { alert("請填寫必要的判定編號與欄位內容！"); return; }
            if(m === 'mode2') { l3 = ""; } 

            var db = getDB();
            var dupIdx = checkDuplicateKey(db, m, pCode);
            if(dupIdx !== -1) {
                if(confirm("手動模式：此判定編號【" + pCode + "】已存在！\n點擊「確定」累加列印張數，點擊「取消」強行新增。")) {
                    db[dupIdx].printCount += 1;
                    saveDB(db);
                    return;
                }
            }

            db.push({ mode: m, pureCode: pCode, line2: l2, line3: l3, line4: l4, isQA: iqc, printCount: 1 });
            saveDB(db);
            document.getElementById('manualPureCode').value = '';
            document.getElementById('manualL2').value = '';
            document.getElementById('manualL3').value = '';
            document.getElementById('manualL4').value = '';
            alert("手動新增成功！");
        }

        function renderTable() {
            var db = getDB();
            var tbody = document.getElementById('storageList');
            tbody.innerHTML = '';

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                var tr = document.createElement('tr');
                var modeText = item.mode === 'mode1' ? '<span style="color:blue;font-weight:bold;">模式1(流水防重)</span>' : '<span style="color:green;font-weight:bold;">模式2(序號防重)</span>';
                var disabledL3 = item.mode === 'mode2' ? 'disabled style="background:#eee"' : '';

                tr.innerHTML = '<td>' + (i+1) + '</td>' +
                    '<td>' + modeText + '</td>' +
                    '<td><b style="color:#d9534f">' + item.pureCode + '</b></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line2+'" onchange="updateItem('+i+', \'line2\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line3+'" '+disabledL3+' onchange="updateItem('+i+', \'line3\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line4+'" onchange="updateItem('+i+', \'line4\', this.value)"></td>' +
                    '<td><select onchange="updateItem('+i+', \'isQA\', this.value === \'true\')">' +
                        '<option value="false" '+( !item.isQA?'selected':'' )+'>一般</option>' +
                        '<option value="true" '+( item.isQA?'selected':'' )+'>QA型</option>' +
                    '</select></td>' +
                    '<td><input type="number" class="count-input" min="0" value="'+item.printCount+'" onchange="updateItem('+i+', \'printCount\', parseInt(this.value,10)||0)"></td>' +
                    '<td><button class="danger" style="padding:3px 8px; font-size:11px;" onclick="deleteItem('+i+')">刪除</button></td>';
                
                tbody.appendChild(tr);
            }
        }

        function updateItem(idx, field, value) {
            var db = getDB();
            db[idx][field] = value;
            localStorage.setItem('palletSysDB', JSON.stringify(db));
        }

        function deleteItem(idx) {
            if(confirm("確定刪除此筆資料嗎？")) {
                var db = getDB();
                db.splice(idx, 1);
                saveDB(db);
            }
        }

        function clearAllData() {
            if(confirm("確定要清空整個資料庫？")) { saveDB([]); }
        }

        // 【無損向量拉伸 SVG 核心：精準控制文字對齊錨點】
        function makeSvgLine(textStr, alignMode) {
            if(!textStr || textStr.trim() === "" || textStr === "&nbsp;") {
                return '&nbsp;';
            }
            var textAnchor = "middle";
            var xPos = "50%";
            
            if(alignMode === "left") {
                textAnchor = "start"; // 靠左對齊
                xPos = "0%";          // 貼緊最左邊界
            } else if(alignMode === "right") {
                textAnchor = "end";   // 靠右對齊
                xPos = "100%";        // 貼緊最右邊界
            }

            return '<svg class="svg-line-container" viewBox="0 0 100 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">' +
                   '<text x="'+xPos+'" y="10" font-family="SimHei, 黑體, Arial Black" font-weight="900" font-size="11" fill="#000" stroke="#000" stroke-width="0.35" text-anchor="'+textAnchor+'">' + textStr + '</text>' +
                   '</svg>';
        }

        function doPrint() {
            var db = getDB();
            var printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            
            var html = '';
            var cellCounter = 0;
            var labelsPerPage = 6;

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                
                for(var c=0; c<item.printCount; c++) {
                    if(cellCounter % labelsPerPage === 0) {
                        if(cellCounter > 0) html += '</div>';
                        html += '<div class="page">';
                    }

                    var isCurrentQA = (item.isQA && c === 0);

                    if (item.mode === 'mode1') {
                        var l4_text = item.line4 + (isCurrentQA ? "  多QA" : "");
                        // 模式一：全部維持居中填滿
                        html += '<div class="label-cell">' +
                                '<div class="m1-h1"></div>' + 
                                '<div class="m1-h2">' + makeSvgLine(item.line2, "center") + '</div>' +
                                '<div class="m1-h3">' + makeSvgLine(item.line3, "center") + '</div>' +
                                '<div class="m1-h4">' + makeSvgLine(l4_text, "center") + '</div>' +
                                '</div>';
                    } else {
                        var l3_text = item.line4 + (isCurrentQA ? "  多QA" : "");
                        // 模式二：最後一行日期人員傳入 "left"，使其靠左對齊，右邊留空
                        html += '<div class="label-cell">' +
                                '<div class="m2-h1"></div>' + 
                                '<div class="m2-h2">' + makeSvgLine(item.line2, "center") + '</div>' +
                                '<div class="m2-h3">' + makeSvgLine(l3_text, "left") + '</div>' +
                                '</div>';
                    }
                    cellCounter++;
                }
            }
            if(cellCounter > 0) html += '</div>';
            printArea.innerHTML = html;

            if(cellCounter === 0) { alert("沒有任何要列印的標籤張數。"); return; }
            window.print();
        }
    </script>
</body>
</html>
