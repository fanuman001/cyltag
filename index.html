<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進料棧板標籤多功能管理系統 (100%精準切割對齊版)</title>
    <style>
        body { font-family: "SimHei", "黑體", "新細明體", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        h3 { color: #333; margin-top: 20px; background: #e9ecef; padding: 6px 10px; border-left: 4px solid #0056b3; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { padding: 10px 20px; background: #e9ecef; cursor: pointer; border: 1px solid #ccc; border-bottom: none; margin-right: 5px; border-radius: 4px 4px 0 0; }
        .tab.active { background: white; font-weight: bold; border-top: 3px solid #0056b3; }
        .tab-content { border: 1px solid #ccc; padding: 15px; background: white; display: none; border-radius: 0 4px 4px 4px; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 250px; font-family: monospace; box-sizing: border-box; padding: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 140px; font-weight: bold; }
        .form-group input, .form-group select { padding: 5px; width: 250px; }
        .btn-group { margin-top: 15px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 10px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button.print-btn { background-color: #28a745; }
        button.print-btn:hover { background-color: #218838; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        
        .data-list { border-collapse: collapse; width: 100%; margin-top: 10px; }
        .data-list th, .data-list td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        .data-list th { background-color: #f1f3f5; }
        .edit-input { width: 95%; padding: 4px; box-sizing: border-box; }
        .count-input { width: 45px; padding: 4px; text-align: center; }
        .config-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px 15px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        .alert-row { background-color: #f8d7da !important; color: #721c24; }

        #printArea { background: #666; padding: 10px; display: none; }

        /* ==================== A4 2x3 貼紙排版縮放區 ==================== */
        @media print {
            html, body { background: white; margin: 0 !important; padding: 0 !important; width: 210mm; height: 297mm; }
            .no-print { display: none !important; }
            #printArea { display: block !important; background: transparent; padding: 0; margin: 0; }
            
            .page { width: 210mm; height: 297mm; page-break-after: always; box-sizing: border-box; overflow: hidden; padding: 0.2cm; margin: 0; }
            
            .label-cell { width: 98mm; height: 90mm; float: left; margin: 0; border: none; box-sizing: border-box; padding: 6mm 5mm; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
            
            .label-cell:nth-child(2n+1) { margin-right: 2mm; }
            .label-cell:nth-child(2n) { margin-left: 2mm; }

            .svg-line-container { width: 100%; height: 100%; display: block; overflow: hidden; }
            
            .m1-h1 { height: 10mm; } 
            .m1-h2 { height: 23mm; } 
            .m1-h3 { height: 23mm; } 
            .m1-h4 { height: 26mm; } 

            .m2-h1 { height: 20mm; } 
            .m2-h2 { height: 28mm; } 
            .m2-h3 { height: 32mm; } 
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <h2>棧板標籤自動流轉系統 (100%精準切割版)</h2>
        
        <div class="config-panel">
            <label style="cursor: pointer;">
                <input type="checkbox" id="enableAlert" checked> 當偵測到序號、原料重複項目時，顯示彈窗提示並將舊單自動歸 0。
            </label>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">非常備 (模式一：大範圍直式複製)</div>
            <div class="tab" onclick="switchTab(2)">常備基板 (模式二：常備表格網頁)</div>
            <div class="tab" onclick="switchTab(3)">模式三：手動逐筆新增</div>
        </div>

        <div id="tab1" class="tab-content active">
            <p>請直接將非常備資料整段複製貼上（系統將根據 10 碼單號自動拆分，完美應對黏字）：</p>
            <textarea id="textData1" placeholder="貼上包含 1173260626... 的原始串流資料"></textarea>
            <button onclick="parseMode1()">精準剖析並匯入</button>
        </div>

        <div id="tab2" class="tab-content">
            <p>請直接將網頁整段複製（重疊貼上時，早上項目張數自動歸0，下午新項目自動帶入）：</p>
            <textarea id="textData2" placeholder="直接把網頁複製的進料管理表資料整段貼在這裡..."></textarea>
            <button onclick="parseMode2()">智慧剖析並匯入</button>
        </div>

        <div id="tab3" class="tab-content">
            <div class="form-group">
                <label>使用版型格式：</label>
                <select id="manualMode" onchange="toggleManualInputs()">
                    <option value="mode1">非常備版型</option>
                    <option value="mode2">常備基板版型</option>
                </select>
            </div>
            <div class="form-group">
                <label>比對唯一編號：</label><input type="text" id="manualPureCode" placeholder="如編號或原料編號">
            </div>
            <div class="form-group">
                <label>第二行顯示內容：</label><input type="text" id="manualL2" placeholder="EM-892K2a HVLP3">
            </div>
            <div id="manualL3Group" class="form-group">
                <label>第三行顯示內容：</label><input type="text" id="manualL3" placeholder="3mil 1/1 1078*1">
            </div>
            <div class="form-group">
                <label id="manualL4Label">第四行顯示內容：</label><input type="text" id="manualL4" placeholder="26 6/26 劉浚銘 50">
            </div>
            <div class="form-group">
                <label>微型小字追蹤碼：</label><input type="text" id="manualSubTrack" placeholder="7-251022-054 (選填)">
            </div>
            <div class="form-group">
                <label>數量異常紅字：</label>
                <select id="manualIsErr">
                    <option value="false">正常 (黑色)</option>
                    <option value="true">異常 (紅色)</option>
                </select>
            </div>
            <div class="form-group">
                <label>是否IQC/QA：</label>
                <select id="manualIqc">
                    <option value="false">無 (一般標籤)</option>
                    <option value="true">有 (首張自動帶 QA)</option>
                </select>
            </div>
            <button onclick="parseMode3()">新增至資料庫</button>
        </div>

        <div class="btn-group">
            <button class="print-btn" onclick="doPrint()">執行列印設定張數</button>
            <button class="danger" onclick="clearAllData()">清空記憶資料庫</button>
        </div>

        <h3>資料庫清單 (異常件自動紅底標記)</h3>
        <table class="data-list">
            <thead>
                <tr>
                    <th width="4%">序</th>
                    <th width="10%">版型</th>
                    <th width="13%">比對判定編號</th>
                    <th width="18%">第二行顯示 (料號+銅箔種類)</th>
                    <th width="18%">第三行顯示 (厚度+銅箔尺寸)</th>
                    <th width="18%">第四行顯示 (日期 人名 數量)</th>
                    <th width="11%">微型追蹤碼</th>
                    <th width="4%">張數</th>
                    <th width="4%">管理</th>
                </tr>
            </thead>
            <tbody id="storageList"></tbody>
        </table>
    </div>

    <div id="printArea"></div>

    <script>
        window.onload = function() { renderTable(); toggleManualInputs(); };

        function switchTab(num) {
            for(var i=1; i<=3; i++) {
                document.getElementById('tab'+i).classList.remove('active');
                document.getElementsByClassName('tab')[i-1].classList.remove('active');
            }
            document.getElementById('tab'+num).classList.add('active');
            document.getElementsByClassName('tab')[num-1].classList.add('active');
        }

        function toggleManualInputs() {
            var m = document.getElementById('manualMode').value;
            if(m === 'mode1') {
                document.getElementById('manualL3Group').style.display = 'block';
                document.getElementById('manualL4Label').innerText = "第四行內容：";
            } else {
                document.getElementById('manualL3Group').style.display = 'none';
                document.getElementById('manualL4Label').innerText = "第三行內容：";
            }
        }

        function getDB() { return JSON.parse(localStorage.getItem('palletSysDB2026')) || []; }
        function saveDB(data) { localStorage.setItem('palletSysDB2026', JSON.stringify(data)); renderTable(); }

        function formatDateStr(dStr) {
            dStr = dStr.trim();
            if(dStr.length === 8) dStr = dStr.substring(2);
            if(dStr.length === 6) {
                var yy = dStr.substring(0, 2);
                var mm = parseInt(dStr.substring(2, 4), 10);
                var dd = parseInt(dStr.substring(4, 6), 10);
                return yy + " " + mm + "/" + dd;
            }
            return dStr;
        }

        function checkDuplicateKey(db, mode, checkCode) {
            for(var i=0; i<db.length; i++) {
                if(db[i].mode === mode && db[i].pureCode.toString().trim() === checkCode.toString().trim()) {
                    return i; 
                }
            }
            return -1;
        }

        // ==================== 【非常備模式一】終極防黏切割演算法 ====================
        function parseMode1() {
            var txt = document.getElementById('textData1').value.trim();
            if(!txt) return;

            // 用正則表達式尋找所有 10 碼數字的起點位置
            var markerRegex = /\b\d{10}\b/g;
            var matches = [];
            var match;
            while ((match = markerRegex.exec(txt)) !== null) {
                matches.push({ id: match[0], index: match.index });
            }

            if(matches.length === 0) {
                alert("未找到符合 10 碼編號開頭的資料！");
                return;
            }

            var db = getDB();
            var showAlert = document.getElementById('enableAlert').checked;
            var successCount = 0;

            for(var i = 0; i < matches.length; i++) {
                var startPos = matches[i].index;
                var endPos = (i + 1 < matches.length) ? matches[i+1].index : txt.length;
                var blockStr = txt.substring(startPos, endPos).trim();

                // 針對單個區塊進行逐行清洗
                var rawLines = blockStr.split('\n');
                var lines = [];
                for(var j=0; j<rawLines.length; j++){
                    var l = rawLines[j].trim();
                    if(l !== "") lines.push(l);
                }

                if(lines.length >= 4) {
                    // 1. 第一行：提取 10碼 ID 與前4碼編號
                    var id10 = matches[i].id;
                    var prefixNo = id10.substring(0, 4); // 開頭的編號
                    var datePart = id10.substring(4, 10); // 提取日期 260626
                    var formattedDate = formatDateStr(datePart);

                    // 2. 第二行：提取名字與料號
                    var line2Text = lines[1];
                    var name = "";
                    var partNo = "";
                    var nameMatch = line2Text.match(/^([\u4e00-\u9fa5]{2,4})/);
                    if(nameMatch) {
                        name = nameMatch[1];
                        partNo = line2Text.substring(name.length).trim();
                    } else {
                        partNo = line2Text;
                    }

                    // 3. 第三、四、五行：厚度、銅箔種類與尺寸
                    var thickness = lines[2]; // 3mil 1/1
                    var foilType = lines[3];  // HVLP3 1078*1

                    // 4. 尋找 EMC 與 U 數量，同時檢驗是否一致
                    var emcQty = "";
                    var uQty = "";
                    var subTrackCode = ""; // 7-251022-054

                    for(var k=0; k<lines.length; k++) {
                        var emcM = lines[k].match(/EMC(\d+)/i);
                        if(emcM) emcQty = emcM[1];

                        var uM = lines[k].match(/^(\d+)U/i);
                        if(uM) uQty = uM[1];

                        var trackM = lines[k].match(/(7-\d{6}-\d{3})/);
                        if(trackM) subTrackCode = trackM[1];
                    }

                    // 如果沒撈到 EMC 數量，拿 U 遞補，反之亦然
                    var finalQty = emcQty || uQty || "0";
                    var isQuantityError = false;
                    if(emcQty && uQty && emcQty !== uQty) {
                        isQuantityError = true; // 觸發紅字提醒
                    }

                    // 5. 組裝符合 2x3 貼紙空間的資料結構
                    var finalLine2 = partNo + " " + foilType; // 第二行：EM-892K2a HVLP3
                    var finalLine3 = thickness + " " + foilType.substring(foilType.indexOf(" ") + 1); 
                    // 精準修正：使第三行變成 "厚度 + 1078*1" 結構
                    var foilSize = foilType.match(/\d+\*\d+/);
                    var finalLine3 = thickness + (foilSize ? " " + foilSize[0] : ""); // 第三行：3mil 1/1 1078*1
                    
                    var finalLine4 = formattedDate + " " + name + " " + finalQty; // 第四行：26 6/26 劉浚銘 50

                    var dupIdx = checkDuplicateKey(db, 'mode1', prefixNo);
                    if(dupIdx !== -1) {
                        db[dupIdx].printCount = 0;
                        if(showAlert) {
                            alert("編號【" + prefixNo + "】重複進料，舊棧板標籤列印張數已自動歸零。");
                        }
                    }

                    db.push({
                        mode: 'mode1',
                        pureCode: prefixNo, // 以開頭前四碼作為重複判定的依據
                        line2: finalLine2,
                        line3: finalLine3,
                        line4: finalLine4,
                        subTrack: subTrackCode, // 微型小字追蹤碼
                        isQtyErr: isQuantityError, // 是否異常變紅
                        isQA: false,
                        printCount: 1
                    });
                    successCount++;
                }
            }

            saveDB(db);
            document.getElementById('textData1').value = '';
            alert("已完成智慧切割！成功匯入 " + successCount + " 筆非常備資料。");
        }

        // ==================== 【常備基板模式二】 ====================
        function parseMode2() {
            var txt = document.getElementById('textData2').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var db = getDB();
            var importCount = 0;
            var showAlert = document.getElementById('enableAlert').checked;

            var partNoRegex = /(1-[A-Za-z0-9]{4}-([A-Za-z0-9]{4}|[A-Za-z0-9]{5,6}))/;

            for(var i=0; i<lines.length; i++) {
                var line = lines[i].trim();
                if(line === "" || line.indexOf("合計") !== -1 || line.indexOf("取消") !== -1 || line.indexOf("原料編號") !== -1) continue;

                var match = partNoRegex.exec(line);
                if(match) {
                    var purePartNo = match[1]; 
                    var partNoIdx = match.index;
                    var frontPart = line.substring(0, partNoIdx).trim();
                    
                    var pureSeqNo = "";
                    var dateNo = "26 6/29"; 

                    var dateMatch = frontPart.match(/(20\d{6})/);
                    if(dateMatch) {
                        var dateStrRaw = dateMatch[1];
                        var dateIndex = frontPart.indexOf(dateStrRaw);
                        var prefixSeq = frontPart.substring(0, dateIndex).trim();
                        pureSeqNo = prefixSeq ? prefixSeq : (importCount + 1).toString();
                        dateNo = formatDateStr(dateStrRaw);
                    } else {
                        var seqMatch = frontPart.match(/^(\d+)/);
                        pureSeqNo = seqMatch ? seqMatch[1] : (importCount + 1).toString();
                    }

                    var backPart = line.substring(partNoIdx + purePartNo.length);
                    var hasIqc = (backPart.indexOf("有") !== -1);

                    var uniqueKey = purePartNo;

                    var dupIdx = checkDuplicateKey(db, 'mode2', uniqueKey);
                    if(dupIdx !== -1) {
                        db[dupIdx].printCount = 0;
                        if(showAlert) {
                            alert("常備基板原料【" + purePartNo + "】重複，舊資料列印數已歸零。");
                        }
                    }
                    
                    db.push({ 
                        mode: 'mode2', 
                        pureCode: uniqueKey, 
                        line2: purePartNo, 
                        line3: "", 
                        line4: dateNo, 
                        subTrack: "", 
                        isQtyErr: false, 
                        isQA: hasIqc, 
                        printCount: 1 
                    });
                    importCount++;
                }
            }
            saveDB(db);
            document.getElementById('textData2').value = '';
            if(importCount > 0) alert("常備基板處理完成，共匯入 " + importCount + " 筆！");
        }

        function parseMode3() {
            var m = document.getElementById('manualMode').value;
            var pCode = document.getElementById('manualPureCode').value.trim();
            var l2 = document.getElementById('manualL2').value.trim();
            var l3 = document.getElementById('manualL3').value.trim();
            var l4 = document.getElementById('manualL4').value.trim();
            var subT = document.getElementById('manualSubTrack').value.trim();
            var isErr = document.getElementById('manualIsErr').value === "true";
            var iqc = document.getElementById('manualIqc').value === "true";
            
            if(!pCode || !l2 || !l4) { alert("請填寫必要的欄位！"); return; }
            if(m === 'mode2') { l3 = ""; }

            var db = getDB();
            var dupIdx = checkDuplicateKey(db, m, pCode);
            if(dupIdx !== -1) { db[dupIdx].printCount = 0; }

            db.push({ mode: m, pureCode: pCode, line2: l2, line3: l3, line4: l4, subTrack: subT, isQtyErr: isErr, isQA: iqc, printCount: 1 });
            saveDB(db);
            alert("手動新增成功！");
        }

        function renderTable() {
            var db = getDB();
            var tbody = document.getElementById('storageList');
            tbody.innerHTML = '';

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                var tr = document.createElement('tr');
                if(item.isQtyErr) { tr.classList.add('alert-row'); }

                var modeText = item.mode === 'mode1' ? '<span style="color:blue;font-weight:bold;">非常備</span>' : '<span style="color:green;font-weight:bold;">常備基板</span>';
                var disabledL3 = item.mode === 'mode2' ? 'disabled style="background:#eee"' : '';
                
                tr.innerHTML = '<td>' + (i+1) + '</td>' +
                    '<td>' + modeText + '</td>' +
                    '<td><b>' + item.pureCode + '</b></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line2+'" onchange="updateItem('+i+', \'line2\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line3+'" '+disabledL3+' onchange="updateItem('+i+', \'line3\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line4+'" onchange="updateItem('+i+', \'line4\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+(item.subTrack || '')+'" onchange="updateItem('+i+', \'subTrack\', this.value)"></td>' +
                    '<td><input type="number" class="count-input" min="0" value="'+item.printCount+'" onchange="updateItem('+i+', \'printCount\', parseInt(this.value,10)||0)"></td>' +
                    '<td><button class="danger" style="padding:3px 8px; font-size:11px;" onclick="deleteItem('+i+')">刪除</button></td>';
                
                tbody.appendChild(tr);
            }
        }

        function updateItem(idx, field, value) {
            var db = getDB();
            db[idx][field] = value;
            localStorage.setItem('palletSysDB2026', JSON.stringify(db));
            if(field === 'printCount') { renderTable(); }
        }

        function deleteItem(idx) {
            if(confirm("確定刪除此筆資料嗎？")) {
                var db = getDB();
                db.splice(idx, 1);
                saveDB(db);
            }
        }

        function clearAllData() { if(confirm("確定要清空整個資料庫？")) { saveDB([]); } }

        // ==================== 【智慧 SVG 線條渲染】支援小字與異常紅字 ====================
        function makeSemanticSvg(item, rowNum, alignMode, extraQA) {
            var textAnchor = (alignMode === "left") ? "start" : "middle";
            var xPos = (alignMode === "left") ? "0%" : "50%";
            var aspectRatio = "none";
            var colorHex = item.isQtyErr ? "#FF0000" : "#000000"; // 數量不一致自動變紅
            
            var segments = [];

            if (item.mode === 'mode1') {
                if (rowNum === 2) {
                    segments.push({ text: item.line2, isBold: true, color: "#000" });
                } 
                else if (rowNum === 3) {
                    segments.push({ text: item.line3, isBold: true, color: "#000" });
                } 
                else if (rowNum === 4) {
                    var tokens = item.line4.split(/\s+/); 
                    if(tokens.length >= 3) {
                        // 日期 (26 6/26) 加粗
                        segments.push({ text: tokens[0] + " " + tokens[1] + "  ", isBold: true, color: "#000" });
                        // 人名 (劉浚銘) 細體
                        segments.push({ text: tokens[2] + " ", isBold: false, color: "#000" });
                        // 數量 (50) 加粗，若異常帶入紅字
                        var remainTokens = tokens.slice(3).join(" ");
                        if(remainTokens) {
                            segments.push({ text: " " + remainTokens, isBold: true, color: colorHex });
                        }
                    } else {
                        segments.push({ text: item.line4, isBold: true, color: "#000" });
                    }
                }
            } 
            else if (item.mode === 'mode2') {
                if (rowNum === 2) {
                    segments.push({ text: item.line2, isBold: true, color: "#000" });
                } 
                else if (rowNum === 3) {
                    var tokens = item.line4.split(/\s+/); 
                    if(tokens.length >= 2) {
                        segments.push({ text: tokens[0] + " " + tokens[1], isBold: true, color: "#000" });
                        var remain = tokens.slice(2).join(" ");
                        if(remain) segments.push({ text: " " + remain, isBold: false, color: "#000" });
                    } else {
                        segments.push({ text: item.line4, isBold: true, color: "#000" });
                    }
                }
            }

            if(extraQA) {
                segments.push({ text: extraQA, isBold: true, color: "#000" });
            }

            var tspanHtml = '';
            segments.forEach(function(seg) {
                if(!seg.text) return;
                var strokeAttr = (seg.isBold) ? ' stroke-width="0.45" stroke="'+seg.color+'"' : ' stroke-width="0"';
                var weightAttr = (seg.isBold) ? ' font-weight="900"' : ' font-weight="normal"';
                tspanHtml += '<tspan' + weightAttr + strokeAttr + ' fill="' + seg.color + '">' + seg.text + '</tspan>';
            });

            // 處理浮動微型追蹤碼 (只有非常備第4行需要漂浮在人名上方)
            var subTrackHtml = '';
            if(item.mode === 'mode1' && rowNum === 4 && item.subTrack) {
                // 放置於小字級別，x設在中間略偏左，y上提至2
                subTrackHtml = '<text x="48%" y="3" font-family="Arial" font-size="3" font-weight="normal" text-anchor="start" fill="#555">' + item.subTrack + '</text>';
            }

            return '<svg class="svg-line-container" viewBox="0 0 100 12" preserveAspectRatio="' + aspectRatio + '" xmlns="http://www.w3.org/2000/svg">' +
                   subTrackHtml +
                   '<text x="'+xPos+'" y="10" font-family="SimHei, 黑體, Arial" font-size="11" text-anchor="' + textAnchor + '">' + tspanHtml + '</text>' +
                   '</svg>';
        }

        function doPrint() {
            var db = getDB();
            var printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            var html = '';
            var cellCounter = 0;
            var labelsPerPage = 6;

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                if(item.printCount <= 0) continue; 
                
                for(var c=0; c<item.printCount; c++) {
                    if(cellCounter % labelsPerPage === 0) {
                        if(cellCounter > 0) html += '</div>';
                        html += '<div class="page">';
                    }

                    var isCurrentQA = (item.isQA && c === 0);
                    var qaSuffix = isCurrentQA ? "  QA" : "";

                    if (item.mode === 'mode1') {
                        html += '<div class="label-cell">' +
                                '<div class="m1-h1"></div>' + 
                                '<div class="m1-h2">' + makeSemanticSvg(item, 2, "center", "") + '</div>' + 
                                '<div class="m1-h3">' + makeSemanticSvg(item, 3, "center", "") + '</div>' + 
                                '<div class="m1-h4">' + makeSemanticSvg(item, 4, "center", qaSuffix) + '</div>' + 
                                '</div>';
                    } else {
                        html += '<div class="label-cell">' +
                                '<div class="m2-h1"></div>' + 
                                '<div class="m2-h2">' + makeSemanticSvg(item, 2, "center", "") + '</div>' + 
                                '<div class="m2-h3">' + makeSemanticSvg(item, 3, "left", qaSuffix) + '</div>' + 
                                '</div>';
                    }
                    cellCounter++;
                }
            }
            if(cellCounter > 0) html += '</div>';
            printArea.innerHTML = html;

            if(cellCounter === 0) { alert("當前沒有任何有效列印張數。"); return; }
            window.print();
        }
    </script>
</body>
</html>
