<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>A4 1x6 標籤管理與列印系統 (XP離線版)</title>
    <style>
        body {
            font-family: "新細明體", "MingLiU", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; }
        textarea {
            width: 100%;
            height: 180px;
            margin-bottom: 15px;
            font-family: monospace;
            box-sizing: border-box;
            padding: 10px;
        }
        .btn-group { margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            margin-right: 10px;
        }
        button:hover { background-color: #0056b3; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        
        /* 歷史資料列表樣式 */
        .data-list {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        .data-list th, .data-list td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .data-list th { background-color: #e9ecef; }

        /* ==================== 列印專用 A4 1x6 樣式 ==================== */
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .page {
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                box-sizing: border-box;
                padding-top: 10mm;
                padding-left: 10mm;
            }
            .label-cell {
                width: 190mm;
                height: 45mm;
                margin-bottom: 1mm;
                border: 1px dotted #ccc; /* 貼紙外框線 */
                box-sizing: border-box;
                padding: 12px 15px;
                font-size: 14px;
                line-height: 1.4;
                overflow: hidden;
            }
            .line-row { display: block; clear: both; margin-bottom: 2px; }
            .left-part { float: left; }
            .right-part { float: right; }
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <h2>A4 1x6 貼紙資料儲存與覆蓋系統</h2>
        
        <p><strong>1. 請在下方貼上新資料：</strong></p>
        <textarea id="rawData" placeholder="請在此貼上含有編碼的資料..."></textarea>
        
        <div class="btn-group">
            <button onclick="processAndSave()">1. 讀取並檢查儲存</button>
            <button onclick="window.print()" style="background-color: #28a745;">2. 列印全部儲存標籤</button>
            <button class="danger" onclick="clearAllData()">清空所有記憶庫</button>
        </div>

        <h3>目前資料庫內已儲存的標籤 (依編碼排序)</h3>
        <table class="data-list">
            <thead>
                <tr>
                    <th width="15%">主要編碼</th>
                    <th>標籤預覽內容</th>
                </tr>
            </thead>
            <tbody id="storageList">
                </tbody>
        </table>
    </div>

    <div id="printArea"></div>

    <script>
        // 頁面載入時，自動從瀏覽器記憶體讀取舊資料
        window.onload = function() {
            renderStorageTable();
            renderPrintLabels();
        };

        // 讀取並處理貼上的文字
        function processAndSave() {
            var rawText = document.getElementById('rawData').value.trim();
            if (!rawText) {
                alert("請先貼上資料！");
                return;
            }

            var lines = rawText.split('\n');
            var currentLabel = [];
            
            // 從記憶體中取出目前已有的資料庫 (物件格式 { "1165": [...], "1166": [...] })
            var db = JSON.parse(localStorage.getItem('labelDB')) || {};

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line !== "") {
                    currentLabel.push(lines[i]);
                }

                // 偵測到「修改」代表一筆標籤結束，開始解析編碼
                if (line.indexOf("修改") !== -1) {
                    if (currentLabel.length > 0) {
                        saveToDB(currentLabel, db);
                        currentLabel = []; // 清空處理下一筆
                    }
                }
            }
            // 補漏掉的最後一筆
            if (currentLabel.length > 0) {
                saveToDB(currentLabel, db);
            }

            // 儲存回瀏覽器記憶體
            localStorage.setItem('labelDB', JSON.stringify(db));
            
            // 重新整理畫面
            renderStorageTable();
            renderPrintLabels();
            document.getElementById('rawData').value = ''; // 清空輸入框
            alert("資料處理完畢！");
        }

        // 核心辨識與覆蓋邏輯
        function saveToDB(labelLines, db) {
            // 取出第一行 (例如 "1165\t260625")
            var firstLine = labelLines[0].trim();
            // 切開取得最前面的編碼 (例如 "1165")
            var code = firstLine.split('\t')[0].trim();

            if (!code) return; // 沒找到編碼就不處理

            // 檢查是否重複
            if (db[code]) {
                // 跳出提示問使用者是否覆蓋
                var isOverwrite = confirm("偵測到重複編碼【" + code + "】\n\n是否要用新資料「覆蓋」舊資料？\n(按『確定』覆蓋，按『取消』保留舊資料)");
                if (!isOverwrite) {
                    return; // 使用者選取消，跳過這筆
                }
            }

            // 寫入或覆蓋資料庫
            db[code] = labelLines;
        }

        // 渲染網頁上的歷史表格
        function renderStorageTable() {
            var db = JSON.parse(localStorage.getItem('labelDB')) || {};
            var tbody = document.getElementById('storageList');
            tbody.innerHTML = '';

            // 將編碼排序後呈現
            var sortedKeys = Object.keys(db).sort();

            if (sortedKeys.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="color:gray; text-align:center;">目前無資料</td></tr>';
                return;
            }

            for (var i = 0; i < sortedKeys.length; i++) {
                var key = sortedKeys[i];
                var row = document.createElement('tr');
                
                var tdKey = document.createElement('td');
                tdKey.innerHTML = '<strong>' + key + '</strong>';
                
                var tdContent = document.createElement('td');
                tdContent.innerText = db[key].join(' | '); // 用直線簡短預覽
                
                row.appendChild(tdKey);
                row.appendChild(tdContent);
                tbody.appendChild(row);
            }
        }

        // 渲染 A4 1x6 的列印區塊
        function renderPrintLabels() {
            var db = JSON.parse(localStorage.getItem('labelDB')) || {};
            var sortedKeys = Object.keys(db).sort();
            var printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            var html = '';
            var labelsPerPage = 6;

            for (var i = 0; i < sortedKeys.length; i++) {
                var key = sortedKeys[i];
                var singleLabel = db[key];

                // 每 6 格自動開一個 A4 新頁面
                if (i % labelsPerPage === 0) {
                    if (i > 0) html += '</div>';
                    html += '<div class="page">';
                }

                html += '<div class="label-cell">';
                
                // 處理每行內部
                for (var j = 0; j < singleLabel.length; j++) {
                    var parts = singleLabel[j].split('\t');
                    html += '<div class="line-row">';
                    if (parts.length >= 2) {
                        html += '<span class="left-part">' + parts[0].trim() + '</span>';
                        html += '<span class="right-part">' + parts[1].trim() + '</span>';
                    } else {
                        html += '<span>' + singleLabel[j].trim() + '</span>';
                    }
                    html += '</div>';
                }

                html += '</div>';
            }

            if (sortedKeys.length > 0) {
                html += '</div>';
            }
            printArea.innerHTML = html;
        }

        // 清空所有資料
        function clearAllData() {
            if (confirm("確定要刪除記憶庫裡「所有」的標籤資料嗎？清除後無法復原。")) {
                localStorage.removeItem('labelDB');
                renderStorageTable();
                renderPrintLabels();
            }
        }
    </script>
</body>
</html>
