<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進料棧板標籤多功能管理系統 (XP離線完美版)</title>
    <style>
        body { font-family: "新細明體", "MingLiU", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1050px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        h3 { color: #333; margin-top: 20px; background: #e9ecef; padding: 6px 10px; border-left: 4px solid #0056b3; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { padding: 10px 20px; background: #e9ecef; cursor: pointer; border: 1px solid #ccc; border-bottom: none; margin-right: 5px; border-radius: 4px 4px 0 0; }
        .tab.active { background: white; font-weight: bold; border-top: 3px solid #0056b3; }
        .tab-content { border: 1px solid #ccc; padding: 15px; background: white; display: none; border-radius: 0 4px 4px 4px; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 120px; font-family: monospace; box-sizing: border-box; padding: 10px; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: inline-block; width: 140px; font-weight: bold; }
        .form-group input, .form-group select { padding: 5px; width: 250px; }
        .btn-group { margin-top: 15px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 10px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button.print-btn { background-color: #28a745; }
        button.print-btn:hover { background-color: #218838; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        
        .data-list { border-collapse: collapse; width: 100%; margin-top: 10px; }
        .data-list th, .data-list td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        .data-list th { background-color: #f1f3f5; }
        .edit-input { width: 95%; padding: 4px; box-sizing: border-box; }
        .count-input { width: 45px; padding: 4px; text-align: center; }

        /* ==================== 列印專用 A4 2x3 樣式 ==================== */
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .page { width: 210mm; height: 297mm; page-break-after: always; box-sizing: border-box; padding-top: 12mm; padding-left: 10mm; overflow: hidden; }
            
            /* 2x3 貼紙格子格局 */
            .label-cell { width: 92mm; height: 90mm; float: left; margin-right: 4mm; margin-bottom: 4mm; border: 1px dotted #bbb; box-sizing: border-box; padding: 5mm; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
            .label-cell:nth-child(2n) { margin-right: 0; }
            
            /* SVG 極限填滿包裝器 */
            .svg-line-container { width: 100%; display: block; overflow: hidden; }
            
            /* 模式一高度分配 (4行版面) */
            .m1-h1 { height: 18mm; } /* 第一行留白 */
            .m1-h2 { height: 20mm; } /* 第二行 (料號) */
            .m1-h3 { height: 20mm; } /* 第三行 (規格) */
            .m1-h4 { height: 20mm; } /* 第四行 (日期人員) */

            /* 模式二高度分配 (3行版面) */
            .m2-h1 { height: 24mm; } /* 第一行留白 */
            .m2-h2 { height: 28mm; } /* 第二行 (編號) */
            .m2-h3 { height: 28mm; } /* 第三行 (日期人員) */
        }
    </style>
</head>
<body>

    <div class="container no-print">
        <h2>棧板標籤自動流轉系統 (2x3 自動適應極限版)</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">模式一：貼上直式文字(1*6)</div>
            <div class="tab" onclick="switchTab(2)">模式二：貼上網頁進料表</div>
            <div class="tab" onclick="switchTab(3)">模式三：手動逐筆新增</div>
        </div>

        <div id="tab1" class="tab-content active">
            <p>請貼上第一種原始文字資料（包含「修改」字樣）：</p>
            <textarea id="textData1" placeholder="1165	260625&#10;王水欽	EM-890&#10;4mil 	1/H&#10;RTF3 	1035*2&#10; 	49.2*33.0&#10;EMC	4000&#10;4000	U2635916&#10; &#10;7-260529-070 	修改"></textarea>
            <button onclick="parseMode1()">剖析並匯入</button>
        </div>

        <div id="tab2" class="tab-content">
            <p>請直接從系統網頁「複製整個表格」，並貼在下方框內：</p>
            <textarea id="textData2" placeholder="1	20260629	672...&#10;2	20260629	673	U2618980-1	1-Nn16-U1EA	0930	台燿	4000	徐李淼	有	合格"></textarea>
            <button onclick="parseMode2()">剖析並匯入</button>
        </div>

        <div id="tab3" class="tab-content">
            <div class="form-group">
                <label>使用版型格式：</label>
                <select id="manualMode" onchange="toggleManualInputs()">
                    <option value="mode1">模式一版型 (第1行空白, 2,3,4行有內容)</option>
                    <option value="mode2">模式二版型 (第1行空白, 2,3行有內容)</option>
                </select>
            </div>
            <div class="form-group">
                <label>第二行內容 (編號)：</label><input type="text" id="manualL2" placeholder="如：EM-890 RTF3 或 1-Nn16-U1EA">
            </div>
            <div id="manualL3Group" class="form-group">
                <label>第三行內容 (規格)：</label><input type="text" id="manualL3" placeholder="如：4mil 1/H 1035*2">
            </div>
            <div class="form-group">
                <label id="manualL4Label">第四行內容 (日期)：</label><input type="text" id="manualL4" placeholder="如：26 6/25 王水欽 4000">
            </div>
            <div class="form-group">
                <label>是否IQC/QA：</label>
                <select id="manualIqc">
                    <option value="false">無 (全部皆為一般標籤)</option>
                    <option value="true">有 (首張自動帶 QA 字樣)</option>
                </select>
            </div>
            <button onclick="parseMode3()">新增至資料庫</button>
        </div>

        <div class="btn-group">
            <button class="print-btn" onclick="doPrint()">執行列印設定張數</button>
            <button class="danger" onclick="clearAllData()">清空記憶資料庫</button>
        </div>

        <h3>資料庫清單 (支援行內即時修改、自動存檔)</h3>
        <table class="data-list">
            <thead>
                <tr>
                    <th width="4%">序</th>
                    <th width="8%">版型</th>
                    <th width="28%">第二行 (料號/編號)</th>
                    <th width="22%">第三行 (規格資訊)</th>
                    <th width="20%">第四行 (日期人員)</th>
                    <th width="8%">首張QA</th>
                    <th width="5%">張數</th>
                    <th width="5%">管理</th>
                </tr>
            </thead>
            <tbody id="storageList"></tbody>
        </table>
    </div>

    <div id="printArea"></div>

    <script>
        window.onload = function() { renderTable(); toggleManualInputs(); };

        function switchTab(num) {
            for(var i=1; i<=3; i++) {
                document.getElementById('tab'+i).classList.remove('active');
                document.getElementsByClassName('tab')[i-1].classList.remove('active');
            }
            document.getElementById('tab'+num).classList.add('active');
            document.getElementsByClassName('tab')[num-1].classList.add('active');
        }

        function toggleManualInputs() {
            var m = document.getElementById('manualMode').value;
            if(m === 'mode1') {
                document.getElementById('manualL3Group').style.display = 'block';
                document.getElementById('manualL4Label').innerText = "第四行內容 (日期)：";
            } else {
                document.getElementById('manualL3Group').style.display = 'none';
                document.getElementById('manualL4Label').innerText = "第三行內容 (日期)：";
            }
        }

        function getDB() { return JSON.parse(localStorage.getItem('palletSysDB')) || []; }
        function saveDB(data) { localStorage.setItem('palletSysDB', JSON.stringify(data)); renderTable(); }

        function formatDateStr(dStr) {
            dStr = dStr.trim();
            if(dStr.length === 8) dStr = dStr.substring(2);
            if(dStr.length === 6) {
                var yy = dStr.substring(0, 2);
                var mm = parseInt(dStr.substring(2, 4), 10);
                var dd = parseInt(dStr.substring(4, 6), 10);
                return yy + " " + mm + "/" + dd;
            }
            return dStr;
        }

        // 【通用重複檢查機制】
        function checkDuplicateAndGetCount(db, checkL2) {
            for(var i=0; i<db.length; i++) {
                if(db[i].line2 === checkL2) {
                    return i; // 回傳重複項目的索引
                }
            }
            return -1;
        }

        // 【模式一剖析】
        function parseMode1() {
            var txt = document.getElementById('textData1').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var currentChunk = [];
            var db = getDB();

            for(var i=0; i<lines.length; i++) {
                if(lines[i].trim() !== "") currentChunk.push(lines[i]);
                if(lines[i].indexOf("修改") !== -1) {
                    if(currentChunk.length >= 6) {
                        var r = currentChunk.map(function(l) {
                            var parts = l.split('\t');
                            if(parts.length < 2) parts = l.split(/\s+/); 
                            return parts.map(function(p) { return p.trim(); });
                        });

                        var dateRaw  = r[0][1] || "";
                        var name     = r[1][0] || "";
                        var partNo   = r[1][1] || "";
                        var spec1    = r[2][0] || "";
                        var spec2    = r[2][1] || "";
                        var typeNo   = r[3][0] || "";
                        var size     = r[3][1] || "";
                        var emcCount = r[5][1] || "";

                        var line2_val = partNo + " " + typeNo;
                        var line3_val = spec1 + " " + spec2 + " " + size;
                        var line4_val = formatDateStr(dateRaw) + " " + name + " " + emcCount;

                        var dupIdx = checkDuplicateAndGetCount(db, line2_val);
                        if(dupIdx !== -1) {
                            if(confirm("模式一：料號【" + line2_val + "】已存在！\n按「確定」累加列印張數，按「取消」跳過此筆。")) {
                                db[dupIdx].printCount += 1;
                            }
                        } else {
                            db.push({ mode: 'mode1', line2: line2_val, line3: line3_val, line4: line4_val, isQA: false, printCount: 1 });
                        }
                    }
                    currentChunk = [];
                }
            }
            saveDB(db);
            document.getElementById('textData1').value = '';
            alert("模式一解析處理完畢！");
        }

        // 【模式二剖析】
        function parseMode2() {
            var txt = document.getElementById('textData2').value.trim();
            if(!txt) return;
            var lines = txt.split('\n');
            var db = getDB();
            var importCount = 0;

            for(var i=0; i<lines.length; i++) {
                var line = lines[i].trim();
                if(line === "") continue;

                var cols = line.split('\t');
                if(cols.length < 5) { cols = line.split(/ {2,}/); }
                cols = cols.map(function(c){ return c.trim(); }).filter(function(c){ return c !== ""; });

                if(cols.length < 5) continue;
                if(isNaN(parseInt(cols[0], 10))) continue; 

                var dateNo = formatDateStr(cols[1]); 
                var partNo = cols[4].trim();         
                
                var hasIqc = false;
                for(var k=0; k<cols.length; k++) {
                    if(cols[k] === "有") { hasIqc = true; break; }
                }

                var line2_val = partNo;
                var line3_val = ""; // 模式二沒有第三行規格
                var line4_val = dateNo;

                var dupIdx = checkDuplicateAndGetCount(db, line2_val);
                if(dupIdx !== -1) {
                    if(confirm("模式二：編號【" + line2_val + "】已存在！\n按「確定」累加列印張數，按「取消」跳過此筆。")) {
                        db[dupIdx].printCount += 1;
                    }
                } else {
                    db.push({ mode: 'mode2', line2: line2_val, line3: line3_val, line4: line4_val, isQA: hasIqc, printCount: 1 });
                }
                importCount++;
            }
            saveDB(db);
            document.getElementById('textData2').value = '';
            alert("模式二處理完成！");
        }

        // 【模式三手動新增】
        function parseMode3() {
            var m = document.getElementById('manualMode').value;
            var l2 = document.getElementById('manualL2').value.trim();
            var l3 = document.getElementById('manualL3').value.trim();
            var l4 = document.getElementById('manualL4').value.trim();
            var iqc = document.getElementById('manualIqc').value === "true";
            
            if(!l2 || !l4) { alert("請填寫必要的欄位內容！"); return; }
            if(m === 'mode2') { l3 = ""; } // 模式二強制清空第三行

            var db = getDB();
            var dupIdx = checkDuplicateAndGetCount(db, l2);
            if(dupIdx !== -1) {
                if(confirm("手動模式：編號【" + l2 + "】已存在！\n按「確定」累加張數，按「取消」建立新的一筆。")) {
                    db[dupIdx].printCount += 1;
                    saveDB(db);
                    return;
                }
            }

            db.push({ mode: m, line2: l2, line3: l3, line4: l4, isQA: iqc, printCount: 1 });
            saveDB(db);
            document.getElementById('manualL2').value = '';
            document.getElementById('manualL3').value = '';
            document.getElementById('manualL4').value = '';
            alert("新增成功！");
        }

        function renderTable() {
            var db = getDB();
            var tbody = document.getElementById('storageList');
            tbody.innerHTML = '';

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                var tr = document.createElement('tr');
                var modeText = item.mode === 'mode1' ? '<span style="color:blue;font-weight:bold;">模式1(4行)</span>' : '<span style="color:green;font-weight:bold;">模式2(3行)</span>';
                var disabledL3 = item.mode === 'mode2' ? 'disabled style="background:#eee"' : '';

                tr.innerHTML = '<td>' + (i+1) + '</td>' +
                    '<td>' + modeText + '</td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line2+'" onchange="updateItem('+i+', \'line2\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line3+'" '+disabledL3+' onchange="updateItem('+i+', \'line3\', this.value)"></td>' +
                    '<td><input type="text" class="edit-input" value="'+item.line4+'" onchange="updateItem('+i+', \'line4\', this.value)"></td>' +
                    '<td><select onchange="updateItem('+i+', \'isQA\', this.value === \'true\')">' +
                        '<option value="false" '+( !item.isQA?'selected':'' )+'>一般</option>' +
                        '<option value="true" '+( item.isQA?'selected':'' )+'>QA型</option>' +
                    '</select></td>' +
                    '<td><input type="number" class="count-input" min="0" value="'+item.printCount+'" onchange="updateItem('+i+', \'printCount\', parseInt(this.value,10)||0)"></td>' +
                    '<td><button class="danger" style="padding:3px 8px; font-size:11px;" onclick="deleteItem('+i+')">刪除</button></td>';
                
                tbody.appendChild(tr);
            }
        }

        function updateItem(idx, field, value) {
            var db = getDB();
            db[idx][field] = value;
            localStorage.setItem('palletSysDB', JSON.stringify(db));
        }

        function deleteItem(idx) {
            if(confirm("確定刪除此筆資料嗎？")) {
                var db = getDB();
                db.splice(idx, 1);
                saveDB(db);
            }
        }

        function clearAllData() {
            if(confirm("確定要清空整個資料庫？")) { saveDB([]); }
        }

        // 【高科技動態極限比例拉伸 SVG 產生器】
        function makeSvgLine(textStr) {
            if(!textStr || textStr.trim() === "" || textStr === "&nbsp;") {
                return '&nbsp;';
            }
            // 使用無損向量畫布，不論字多長多短，寬度百分百撐滿，高度鎖定
            return '<svg class="svg-line-container" viewBox="0 0 500 50" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg">' +
                   '<text x="0" y="38" font-family="MingLiU, 新細明體, Arial" font-weight="bold" font-size="42" fill="#000">' + textStr + '</text>' +
                   '</svg>';
        }

        function doPrint() {
            var db = getDB();
            var printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            
            var html = '';
            var cellCounter = 0;
            var labelsPerPage = 6;

            for(var i=0; i<db.length; i++) {
                var item = db[i];
                
                for(var c=0; c<item.printCount; c++) {
                    if(cellCounter % labelsPerPage === 0) {
                        if(cellCounter > 0) html += '</div>';
                        html += '<div class="page">';
                    }

                    // 判斷是否為首張附加 QA
                    var isCurrentQA = (item.isQA && c === 0);

                    if (item.mode === 'mode1') {
                        // 模式一版面：4行（第1行留空）
                        var l4_text = item.line4 + (isCurrentQA ? "  多QA" : "");
                        
                        html += '<div class="label-cell">' +
                                '<div class="m1-h1"></div>' + 
                                '<div class="m1-h2">' + makeSvgLine(item.line2) + '</div>' +
                                '<div class="m1-h3">' + makeSvgLine(item.line3) + '</div>' +
                                '<div class="m1-h4">' + makeSvgLine(l4_text) + '</div>' +
                                '</div>';
                    } else {
                        // 模式二版面：3行（第1行留空，高度重新最佳化分配）
                        var l3_text = item.line4 + (isCurrentQA ? "  多QA" : "");
                        
                        html += '<div class="label-cell">' +
                                '<div class="m2-h1"></div>' + 
                                '<div class="m2-h2">' + makeSvgLine(item.line2) + '</div>' +
                                '<div class="m2-h3">' + makeSvgLine(l3_text) + '</div>' +
                                '</div>';
                    }
                    cellCounter++;
                }
            }
            if(cellCounter > 0) html += '</div>';
            printArea.innerHTML = html;

            if(cellCounter === 0) { alert("沒有任何要列印的標籤張數。"); return; }
            window.print();
        }
    </script>
</body>
</html>
